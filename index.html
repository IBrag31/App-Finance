<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance+">

<title>Finance+</title>

<link rel="stylesheet" href="styles.css">

<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
window.onerror = function(message, source, lineno){
alert("Erreur JS: " + message + " ligne: " + lineno);
};
</script>

</head>

<body>

<!-- 🔥 APP -->

<div id="splash">
<img src="financeplus.PNG" class="splash-logo">
</div>

<div class="app-container">
<div class="sections-container">

<!-- TES SECTIONS ICI (tu gardes tout ton HTML actuel) -->

</div>
</div>

<!-- 🧭 TABBAR -->

<div class="tabbar">

<div class="tab active" onclick="showSection('budget', this)">
📊<span>Résumé</span>
</div>

<div class="tab" onclick="showSection('objectifs', this)">
🎯<span>Objectifs</span>
</div>

<div class="tab" onclick="showSection('historique', this)">
📅<span>Historique</span>
</div>

<div class="tab" onclick="showSection('sauvegarde', this)">
⚙️<span>Sauvegarde</span>
</div>

</div>

<!-- TOAST -->
<div id="toast">✔ Sauvegardé</div>

<!-- MODAL DEPENSE -->
<div id="depenseModal" class="modal" onclick="fermerModal()">
<div class="modal-content" onclick="event.stopPropagation()">

<h3>Nouvelle dépense</h3>

<input type="text" id="depenseNom" placeholder="Nom">
<input type="number" id="depenseMontant" placeholder="Montant">

<select id="typeDepense">
<option value="fixe">Dépense fixe</option>
<option value="variable">Dépense variable</option>
</select>

<div class="modal-actions">
<button onclick="fermerModal()">Annuler</button>
<button onclick="validerDepense()">Ajouter</button>
</div>

</div>
</div>

<!-- MODAL REVENU -->
<div id="revenuModal" class="modal" onclick="fermerModalRevenu()">
<div class="modal-content" onclick="event.stopPropagation()">

<h3>Nouveau revenu</h3>

<input type="text" id="revenuNom" placeholder="Ex: Salaire">
<input type="number" id="revenuMontant">
<input type="month" id="revenuMois">

<div class="modal-actions">
<button onclick="fermerModalRevenu()">Annuler</button>
<button onclick="validerRevenu()">Ajouter</button>
</div>

</div>
</div>

<!-- 🔌 SCRIPTS -->

<script src="storage.js"></script>
<script src="app.js?v=3"></script>
<script src="depenses.js?v=3"></script>
<script src="revenus.js?v=3"></script>
<script src="historique.js"></script>
<script src="ui.js"></script>

</body>
</html>
