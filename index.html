<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance+">

<title>Finance+</title>

<link rel="stylesheet" href="styles.css">

<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  
window.onerror = function(message, source, lineno, colno){
  alert(
    "Erreur JS:\n" +
    message +
    "\nFichier: " + source +
    "\nLigne: " + lineno +
    "\nColonne: " + colno
  );
};
  
</script>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="financeplus.PNG" class="splash-logo">
</div>

<!-- APP -->
<div class="app-container">
<div class="sections-container">

<!-- ========================= -->
<!-- 💰 BUDGET -->
<!-- ========================= -->

<div class="section active" id="section-budget">
  <div class="section-scroll">

    <div class="page-header page-header-dashboard">
      <h1>Résumé</h1>
      <div id="todayDate"></div>
    </div>

    <div class="card">
      <div id="revenusDisplay">0 €</div>
      <div id="depensesDisplay">0 €</div>
      <div id="epargneMoisDisplay">0 €</div>
      <div id="epargneTotaleDisplay">0 €</div>
    </div>

    <!-- INPUTS cachés nécessaires -->
    <input type="hidden" id="epargneMois" value="0">
    <input type="hidden" id="epargneTotale" value="0">

  </div>
</div>

<!-- ========================= -->
<!-- 💸 DEPENSES -->
<!-- ========================= -->

<div class="section" id="section-depenses">
  <div class="section-scroll">

    <div class="card">
      <div id="depensesTotalPage">0 €</div>
    </div>

    <div class="card">
      <div id="depensesFixesPage"></div>
      <div id="depensesVariablesPage"></div>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- 💰 REVENUS -->
<!-- ========================= -->

<div class="section" id="section-revenus">
  <div class="section-scroll">

    <div class="card">
      <div id="revenusPage">0 €</div>
      <div id="revenusMois">0 €</div>
      <div id="moisActuelLabel"></div>
    </div>

    <div class="card">
      <div id="revenusList"></div>
    </div>

    <div class="card">
      <div id="especesValue">0 €</div>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- 🎯 OBJECTIFS -->
<!-- ========================= -->

<div class="section" id="section-objectifs">
  <div class="section-scroll">
    <div class="card">
      <div id="bar1"></div>
      <div id="bar2"></div>
      <div id="bar3"></div>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- 📅 HISTORIQUE -->
<!-- ========================= -->

<div class="section" id="section-historique">
  <div class="section-scroll">

    <input type="month" id="moisSelect">

    <table id="historiqueTable">
      <tbody></tbody>
    </table>

    <canvas id="historyChart"></canvas>

  </div>
</div>

<!-- ========================= -->
<!-- ⚙️ SAUVEGARDE -->
<!-- ========================= -->

<div class="section" id="section-sauvegarde">
  <div class="section-scroll">

    <button onclick="sauvegardeAuto()">Sauvegarder</button>
    <button onclick="restaurerDepuisIcloud()">Restaurer</button>

    <input type="file" id="fileInput" hidden>

  </div>
</div>

</div>
</div>

<!-- ========================= -->
<!-- TABBAR -->
<!-- ========================= -->

<div class="tabbar">

<div class="tab active" onclick="showSection('budget', this)">
📊<span>Résumé</span>
</div>

<div class="tab" onclick="showSection('objectifs', this)">
🎯<span>Objectifs</span>
</div>

<div class="tab" onclick="showSection('historique', this)">
📅<span>Historique</span>
</div>

<div class="tab" onclick="showSection('sauvegarde', this)">
⚙️<span>Sauvegarde</span>
</div>

</div>

<!-- TOAST -->
<div id="toast">✔ Sauvegardé</div>

<!-- MODALS -->

<div id="depenseModal" class="modal"></div>
<div id="revenuModal" class="modal"></div>

<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->

<script src="storage.js"></script>
<script src="depenses.js?v=4"></script>
<script src="revenus.js?v=4"></script>
<script src="historique.js?v=4"></script>
<script src="app.js?v=4"></script>
<script src="ui.js?v=4"></script>

</body>
</html>
