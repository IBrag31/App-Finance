<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f172a">

<title>Finance+</title>

<!-- 🔥 CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- APP -->
<div class="app-container">

  <!-- ========================= -->
  <!-- 🏠 RÉSUMÉ -->
  <!-- ========================= -->

  <div class="section active" id="section-resume">
    <div class="section-scroll">

      <div class="page-header">
        <h1>Résumé</h1>
        <div id="todayDate"></div>
      </div>

      <div class="card">
        <h2>Budget</h2>

        <div class="rings-container">
          <svg><!-- tes rings existants --></svg>
        </div>

        <div class="resume-info">
          <div id="resumeDepenses"></div>
          <div id="resumeRestant"></div>
          <div id="resumeEpargne"></div>
        </div>
      </div>

      <div class="cards-grid">

  <div class="card small-card clickable" onclick="openRevenus()">
    <h3>Revenus</h3>
    <span>Ce mois</span>
    <div id="revenusDisplay">0 €</div>
  </div>

  <div class="card small-card clickable" onclick="openDepenses()">
    <h3>Dépenses</h3>
    <span>Total</span>
    <div id="depensesDisplay">0 €</div>
  </div>

  <div class="card small-card">
    <h3>Épargne prévue</h3>
    <span>Objectif</span>
    <div id="epargneMoisDisplay"></div>
  </div>

  <div class="card small-card">
    <h3>Épargne actuelle</h3>
    <span>Total</span>
    <div id="epargneTotaleDisplay"></div>
  </div>

</div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- ⚙️ RÉGLAGES -->
  <!-- ========================= -->

  <div class="section" id="section-settings">
    <div class="section-scroll">

      <div class="card">
        <button onclick="sauvegardeAuto()">💾 Sauvegarder</button>
        <button onclick="restaurerDepuisIcloud()">📥 Restaurer</button>
      </div>

      <div class="card">
        <button onclick="resetApp()">🗑️ Reset données</button>
      </div>

    </div>
  </div>

</div>

<!-- TABBAR -->
<div class="tabbar">
  <div class="tab active" onclick="showSection('resume', this)">
    🏠<span>Résumé</span>
  </div>

  <div class="tab" onclick="showSection('settings', this)">
    ⚙️<span>Réglages</span>
  </div>
</div>

<!-- 🔥 SCRIPTS -->
<script src="storage.js"></script>
<script src="depenses.js"></script>
<script src="revenus.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
