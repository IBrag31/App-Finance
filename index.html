<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f172a">

<title>Finance+</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app-container">

<!-- ========================= -->
<!-- 🏠 RÉSUMÉ -->
<!-- ========================= -->

<div class="section active" id="section-resume">
  <div class="section-scroll">

    <div class="page-header">
      <h1>Résumé</h1>
      <div id="todayDate"></div>
    </div>

    <div class="card budget-card-new">
      <h2>Budget</h2>

      <div class="budget-rows">

        <div class="budget-row">
          <div class="progress-bar">
            <div class="progress-fill revenus" id="budgetRevenusBar"></div>
          </div>
          <div class="budget-info">
            <span class="budget-title">Revenus</span>
            <span id="budgetRevenusText" class="budget-value"></span>
          </div>
        </div>

        <div class="budget-row">
          <div class="progress-bar">
            <div class="progress-fill depenses" id="budgetDepensesBar"></div>
          </div>
          <div class="budget-info">
            <span class="budget-title">Dépenses</span>
            <span id="budgetDepensesText" class="budget-value"></span>
          </div>
        </div>

        <div class="budget-row">
          <div class="progress-bar">
            <div class="progress-fill epargne" id="budgetEpargneBar"></div>
          </div>
          <div class="budget-info">
            <span class="budget-title">Épargne</span>
            <span id="budgetEpargneText" class="budget-value"></span>
          </div>
        </div>

      </div>
    </div>

    <div class="cards-grid three">
      <div class="card small-card clickable" onclick="showSection('revenus')">
        <h3>Revenus</h3>
        <span>Ce mois</span>
        <div id="revenusDisplay">0 €</div>
      </div>

      <div class="card small-card clickable" onclick="showSection('depenses')">
        <h3>Dépenses</h3>
        <span>Total</span>
        <div id="depensesDisplay">0 €</div>
      </div>

      <div class="card small-card clickable" onclick="showSection('epargne')">
  <h3>Épargne</h3>
  <span>Ce mois</span>
  <div id="epargneMoisDisplay">0 €</div>
</div>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- 💰 REVENUS -->
<!-- ========================= -->

<div class="section" id="section-revenus">
  <div class="section-scroll">

    <div class="page-header revenus-header">
      <div class="back-btn" onclick="showSection('resume')">←</div>
      <h1>Revenus</h1>
      <button onclick="openAddRevenu()" class="add-btn">+</button>
    </div>

    <!-- TOTAL -->
<div class="card revenus-card total-card">
  <div class="revenus-card-header">Total revenus</div>
  <div class="revenus-card-value" id="revenusPage">0 €</div>
</div>

<!-- GRID -->
<div class="cards-grid revenus-grid">

  <!-- CE MOIS -->
  <div class="card small-card revenus-small">
    <h3>Ce mois-ci</h3>
    <span id="moisActuelLabel"></span>
    <div id="revenusMois">0 €</div>
  </div>

  <!-- ESPECES -->
  <div class="card small-card revenus-small">
    <h3>Espèces</h3>

    <div class="revenus-especes-row">
      <button onclick="retirerEspeces()" class="circle-btn">−</button>
      <div id="especesValue">0 €</div>
      <button onclick="ajouterEspeces()" class="circle-btn">+</button>
    </div>

  </div>

</div>

    <div id="revenusList"></div>

  </div>
</div>

<!-- ========================= -->
<!-- 💸 DÉPENSES -->
<!-- ========================= -->

<div class="section" id="section-depenses">
  <div class="section-scroll">

    <div class="page-header revenus-header">
      <div class="back-btn" onclick="showSection('resume')">←</div>
      <h1>Dépenses</h1>
      <button onclick="openAddDepense()" class="add-btn">+</button>
    </div>

    <!-- 💰 TOTAL -->
    <div class="card revenus-card total-card">
      <div class="revenus-card-header">Total dépenses</div>
      <div class="revenus-card-value" id="depensesTotalPage">0 €</div>
    </div>

    <!-- GRID -->
    <div class="cards-grid revenus-grid">

      <!-- FIXES -->
      <div class="card small-card revenus-small clickable"
           onclick="showSection('depenses-fixes')">
        <h3>📦 Fixes</h3>
        <div id="totalFixesPage">0 €</div>
      </div>

      <!-- VARIABLES -->
      <div class="card small-card revenus-small clickable"
           onclick="showSection('depenses-variables')">
        <h3>🛒 Variables</h3>
        <div id="totalVariablesPage">0 €</div>
      </div>

    </div>

  </div>
</div>

<!-- ========================= -->
<!-- 📦 DÉPENSES FIXES -->
<!-- ========================= -->
<div class="section" id="section-depenses-fixes">
  <div class="section-scroll">

    <div class="page-header revenus-header">
      <div class="back-btn" onclick="showSection('depenses')">←</div>
      <h1>Dépenses fixes</h1>
    </div>

    <div id="depensesFixesPage"></div>

  </div>
</div>

<!-- ========================= -->
<!-- 🛒 DÉPENSES VARIABLES -->
<!-- ========================= -->
<div class="section" id="section-depenses-variables">
  <div class="section-scroll">

    <div class="page-header revenus-header">
      <div class="back-btn" onclick="showSection('depenses')">←</div>
      <h1>Dépenses variables</h1>
    </div>

    <div id="depensesVariablesPage"></div>

  </div>
</div>

<!-- ========================= -->
<!-- ⚙️ RÉGLAGES -->
<!-- ========================= -->

<div class="section" id="section-settings">
  <div class="section-scroll">

    <div class="card">
      <button onclick="sauvegardeAuto()">💾 Sauvegarder</button>
      <button onclick="restaurerDepuisIcloud()">📥 Restaurer</button>
    </div>

    <div class="card">
      <button onclick="resetApp()">🗑️ Reset données</button>
    </div>

  </div>
</div>

</div>

<!-- ========================= -->
<!-- 🔔 TOAST (IMPORTANT) -->
<!-- ========================= -->

<div id="toast"></div>

<!-- ========================= -->
<!-- TABBAR -->
<!-- ========================= -->

<div class="tabbar">
  <div class="tab active" onclick="showSection('resume', this)">
    🏠<span>Résumé</span>
  </div>

  <div class="tab" onclick="showSection('settings', this)">
    ⚙️<span>Réglages</span>
  </div>
</div>

<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->

<script src="storage.js"></script>
<script src="depenses.js"></script>
<script src="revenus.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
