<body>

<!-- SPLASH -->
<div id="splash">
  <img src="financeplus.PNG" class="splash-logo">
</div>

<!-- APP -->
<div class="app-container">

  <!-- ========================= -->
  <!-- 🏠 RÉSUMÉ -->
  <!-- ========================= -->

  <div class="section active" id="section-resume">
    <div class="section-scroll">

      <!-- HEADER -->
      <div class="page-header">
        <h1>Résumé</h1>
        <div id="todayDate"></div>
      </div>

      <!-- 🔵 ANNEAUX -->
      <div class="card">
        <h2>Budget</h2>

        <div class="rings-container">
          <svg><!-- tes rings existants --></svg>
        </div>

        <div class="resume-info">
          <div id="resumeDepenses"></div>
          <div id="resumeRestant"></div>
          <div id="resumeEpargne"></div>
        </div>
      </div>

      <!-- 🟢 REVENUS -->
      <div class="card clickable" onclick="openRevenus()">
        <h3>Revenus</h3>
        <div id="revenusDisplay">0 €</div>
      </div>

      <!-- 🔴 DEPENSES -->
      <div class="card clickable" onclick="openDepenses()">
        <h3>Dépenses</h3>
        <div id="depensesDisplay">0 €</div>
      </div>

      <!-- 🟡 ÉPARGNE -->
      <div class="card">
        <h3>Épargne</h3>
        <div id="epargneMoisDisplay"></div>
        <div id="epargneTotaleDisplay"></div>
      </div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- ⚙️ RÉGLAGES -->
  <!-- ========================= -->

  <div class="section" id="section-settings">
    <div class="section-scroll">

      <div class="card">
        <button onclick="sauvegardeAuto()">💾 Sauvegarder</button>
        <button onclick="restaurerDepuisIcloud()">📥 Restaurer</button>
      </div>

      <div class="card">
        <button onclick="resetApp()">🗑️ Reset données</button>
      </div>

    </div>
  </div>

</div>

<!-- TABBAR -->
<div class="tabbar">

  <div class="tab active" onclick="showSection('resume', this)">
    🏠<span>Résumé</span>
  </div>

  <div class="tab" onclick="showSection('settings', this)">
    ⚙️<span>Réglages</span>
  </div>

</div>
