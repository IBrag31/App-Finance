<script>

let swipeStartX = 0;

let armedRow = null;
let armedRevenuRow = null;

document.addEventListener("touchstart", (e) => {
  if(armedRow && !e.target.closest(".depense-row")){
    armedRow.style.transform = "translateX(0)";
    armedRow.classList.remove("swiping");
    armedRow = null;
  }
});


let historyChart;
let autoSaveTimeout;

const OBJECTIF_EPARGNE = 5000;

function euro(n){

return Number(n || 0).toLocaleString("fr-FR",{
minimumFractionDigits:2,
maximumFractionDigits:2
}) + " €";

}

/* swipe sections */

const sections = [
"budget",
"objectifs",
"historique",
"sauvegarde"
];

let currentSectionIndex = 0;


function updateRing(){

const mois = getMoisActuel();
const revenus = getRevenusDuMois(mois) + especes;

const epargne = +document.getElementById("epargneMois").value || 0;
const depenses = calculTotalDepenses();

const budgetMax = Math.max(revenus - epargne,0);

let fixes = 0;
let variables = 0;

depensesDetail.forEach(d=>{
const montant = Number(d.montant) || 0;
if(d.type === "fixe") fixes += montant;
else variables += montant;
});

// UI
document.getElementById("revenusPage")?.innerText = euro(revenus);
document.getElementById("epargneMoisPage")?.innerText = euro(epargne);
document.getElementById("epargneTotalePage")?.innerText =
euro(getEpargneTotale());

// RINGS
const fixesPercent = budgetMax > 0 ? fixes / budgetMax : 0;
const variablesPercent = budgetMax > 0 ? variables / budgetMax : 0;
const totalPercent = budgetMax > 0 ? depenses / budgetMax : 0;

document.querySelector(".ring-fixes")?.style
.setProperty("stroke-dashoffset", 326 - fixesPercent * 326);

document.querySelector(".ring-variables")?.style
.setProperty("stroke-dashoffset", 264 - variablesPercent * 264);

document.querySelector(".ring-total")?.style
.setProperty("stroke-dashoffset", 188 - totalPercent * 188);

// résumé
document.getElementById("resumeDepenses")?.innerText = euro(depenses);

const restant = Math.max(budgetMax - depenses,0);
document.getElementById("resumeRestant")?.innerText = euro(restant);

document.getElementById("resumeEpargne")?.innerText =
euro(getEpargneTotale()) + " / " + euro(OBJECTIF_EPARGNE);

// dashboard
document.getElementById("revenusDisplay")?.innerText = euro(revenus);
document.getElementById("depensesDisplay")?.innerText = euro(depenses);
document.getElementById("epargneMoisDisplay")?.innerText = euro(epargne);
document.getElementById("epargneTotaleDisplay")?.innerText =
euro(getEpargneTotale());

}

function update(){

const epargne = Number(document.getElementById("epargneMois").value) || 0;
const epargneTotale = Number(document.getElementById("epargneTotale").value) || 0;

localStorage.setItem("epargneMois", epargne);
localStorage.setItem("epargneTotale", epargneTotale);

updateRing();

}
 
function ouvrirModal(){

const modal = document.getElementById("depenseModal");
if(modal) modal.classList.add("show");

}

function fermerModal(){
const modal = document.getElementById("depenseModal");
if(!modal || !modal.classList.contains("show")) return;
modal.classList.remove("show");
}

function validerDepense(){

const nom = document.getElementById("depenseNom").value.trim();

const montant = parseFloat(
document.getElementById("depenseMontant").value
);

const type = document.getElementById("typeDepense").value;

if(!nom || isNaN(montant)) return;

const montantArrondi = Math.round(montant * 100) / 100;

depensesDetail.push({
nom,
montant: montantArrondi,
type
});

saveDepenses();
renderDepenses();
renderDepensesPage();
updateRing();

document.getElementById("depenseNom").value = "";
document.getElementById("depenseMontant").value = "";

// remet le curseur dans le champ nom
document.getElementById("depenseNom").focus();

fermerModal();

}


let currentRow = null;

function startSwipe(e,index){

swipeStartX = e.touches[0].clientX;
currentRow = e.currentTarget;

}

 function endSwipe(e, index){

  const diff = e.changedTouches[0].clientX - swipeStartX;

  if(diff < -100 && currentRow){

    currentRow.style.transform = "translateX(-100%)";

    setTimeout(()=>{
      supprimerDepense(index);
      showToast("🗑️ Dépense supprimée");
    },200);

  }
  else if(currentRow){
    currentRow.style.transform = "translateX(0)";
    currentRow.classList.remove("swiping");
  }

}
 
/* ===== SWIPE REVENUS ===== */

let revenuSwipeStartX = 0;
let currentRevenuRow = null;



function initChart(){

if(typeof Chart === "undefined") return;

if(historyChart) historyChart.destroy();

const ctx = document.getElementById("historyChart").getContext("2d");

historyChart = new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"Dépenses",data:[],borderColor:"#ef4444"},
{label:"Épargne",data:[],borderColor:"#22c55e"}
]
}
});
}
 
function majGraph(){

if(!historyChart) return;

historyChart.data.labels = historique.map(m => m.mois);
historyChart.data.datasets[0].data = historique.map(m => m.depenses);
historyChart.data.datasets[1].data = historique.map(m => m.epargne);

historyChart.update();

}

function ajouterMois(){

    const moisInput = document.getElementById("moisSelect").value;

    if(!moisInput){
        alert("Choisis un mois avant d’ajouter.");
        return;
    }

    const [annee, mois] = moisInput.split("-");
    const moisFinal = mois + "/" + annee;
    const existeDeja = historique.some(m => m.mois === moisFinal);

    if(existeDeja){
        showToast("⚠️ Ce mois existe déjà");
        return;
    }

    const depenses = calculTotalDepenses();
    
    const epargne =
    +document.getElementById("epargneMois").value;

    historique.push({mois: moisFinal, depenses, epargne});
    autoSaveDebounced();
    afficherHistorique();
    majGraph();
    updateObjectifs();
    update();
    showToast("📅 Mois ajouté");
}

function getEpargneTotale(){
    return historique.reduce((total, mois) => total + mois.epargne, 0);
}

function afficherHistorique(){
    const tbody = document.querySelector("#historiqueTable tbody");
    tbody.innerHTML="";
    
    historique.forEach((m,i)=>{
        tbody.innerHTML += `
        <tr>
        <td>${m.mois}</td>
        <td>${euro(m.depenses)}</td>
        <td>${euro(m.epargne)}</td>
        <td>
        <button onclick="supprimer(${i})"
        style="background:#ef4444; cursor:pointer; padding:6px 10px; border-radius:8px;">
        X
        </button>
        </td>
        </tr>`;
    });
}

function supprimer(i){
    historique.splice(i,1);
    autoSaveDebounced();
    afficherHistorique();
    majGraph();
    updateObjectifs();

    showToast("🗑️ Mois supprimé");
}

function sauvegardeAuto(){

showToast("✔ Sauvegardé");

const data = {
historique: historique,
depensesDetail: depensesDetail,
epargneMois: document.getElementById("epargneMois").value
};

const dataStr = "data:text/json;charset=utf-8," +
encodeURIComponent(JSON.stringify(data, null, 2));

const a = document.createElement("a");
a.setAttribute("href", dataStr);
a.setAttribute("download", "sauvegarde_budget.json");

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}

function handleImport(e){

const file = e.target.files[0];

if(!file){
alert("Aucun fichier détecté");
return;
}

const reader = new FileReader();

reader.onload = function(event){

let data;

try{
data = JSON.parse(event.target.result);
} catch(error){
alert("Fichier invalide ❌");
return;
}

historique = data.historique || [];
depensesDetail = data.depensesDetail || [];

if(data.revenus){
document.getElementById("revenus").value = data.revenus;
localStorage.setItem("revenus", data.revenus);
}

if(data.epargneMois){
document.getElementById("epargneMois").value = data.epargneMois;
localStorage.setItem("epargneMois", data.epargneMois);
}

saveDepenses();
renderDepenses();
updateRing();

autoSaveDebounced();

afficherHistorique();
majGraph();
updateObjectifs();

setTimeout(() => {
showToast("📥 Données restaurées");
}, 50);

};

reader.readAsText(file, "UTF-8");

}

function updateObjectifs(){

    let total = getEpargneTotale();

    const objectif1 = 6000;  // Sécurité
    const objectif2 = 1500;  // Vacances
    const objectif3 = 3000;  // Projet

    // ---- Sécurité ----
    const securiteRempli = Math.min(total, objectif1);
    document.getElementById("bar1").style.width =
        (securiteRempli / objectif1) * 100 + "%";

    total -= securiteRempli;

    // ---- Vacances ----
    const vacancesRempli = Math.min(total, objectif2);
    document.getElementById("bar2").style.width =
        (vacancesRempli / objectif2) * 100 + "%";

    total -= vacancesRempli;

    // ---- Projet ----
    const projetRempli = Math.min(total, objectif3);
    document.getElementById("bar3").style.width =
        (projetRempli / objectif3) * 100 + "%";
}

function showSection(name, element){

    document.querySelectorAll(".section")
        .forEach(sec => sec.classList.remove("active"));

    document.querySelectorAll(".tab")
        .forEach(tab => tab.classList.remove("active"));

    const section = document.getElementById("section-" + name);
    if(section) section.classList.add("active");

    if(element) element.classList.add("active");

    currentSectionIndex = sections.indexOf(name);

    if(name === "depenses"){
        renderDepensesPage();
    }

    if(name === "revenus"){
        renderRevenusPage();
    }

}
      
function restaurerDepuisIcloud(){
    const input = document.getElementById("fileInput");
    input.value = "";
    input.click();
}

let toastTimeout;

function showToast(message){

    const toast = document.getElementById("toast");
    if(!toast) return;

    clearTimeout(toastTimeout);

    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(0)";

    setTimeout(()=>{
        toast.innerText = message;
        toast.style.opacity = "1";
        toast.style.transform = "translateX(-50%) translateY(-5px)";
    },10);

    toastTimeout = setTimeout(()=>{
        toast.style.opacity = "0";
        toast.style.transform = "translateX(-50%) translateY(0)";
    },1500);

}

function saveDepenses(){
localStorage.setItem(
"depensesDetail",
JSON.stringify(depensesDetail)
);
autoSaveDebounced();
}

function autoSave(){
localStorage.setItem("historique", JSON.stringify(historique));
}

function autoSaveDebounced(){

clearTimeout(autoSaveTimeout);

autoSaveTimeout = setTimeout(() => {

const data = {
historique,
depensesDetail,
revenus: document.getElementById("revenus").value,
epargneMois: document.getElementById("epargneMois").value,
epargneTotale: document.getElementById("epargneTotale").value
};

// sauvegarde principale
localStorage.setItem("financeData", JSON.stringify(data));

// backup de sécurité
localStorage.setItem("financeBackup", JSON.stringify(data));

console.log("💾 autosave");

}, 300);
}

function goToSection(index){

if(index < 0 || index >= sections.length) return;

document.querySelectorAll(".section")
.forEach(sec => sec.classList.remove("active"));

function ouvrirModalRevenu(){
  const modal = document.getElementById("revenuModal");

    // 🔥 auto mois actuel
  document.getElementById("revenuMois").value = getMoisActuel();

  if(modal) modal.classList.add("show");
}

function fermerModalRevenu(){
  const modal = document.getElementById("revenuModal");
  if(modal) modal.classList.remove("show");
}




function renderEspeces(){
  const el = document.getElementById("especesValue");
  if(!el) return;

  el.innerText = euro(especes);

  // petite animation visuelle ✨
  el.style.transform = "scale(1.1)";
  setTimeout(()=> el.style.transform = "scale(1)", 120);
}

function initUI(){
  renderDepenses();
  renderRevenusPage();
  renderEspeces();
}

// ✅ AJOUTER ESPÈCES
function ajouterEspeces(){
  especes += 5;
  saveEspeces();
}

// ✅ RETIRER ESPÈCES
function retirerEspeces(){
  especes -= 5;
  if(especes < 0) especes = 0;
  saveEspeces();
}

// ✅ SAVE
function saveEspeces(){
  localStorage.setItem("especes", especes);
  renderEspeces();
  updateRing(); // 🔥 important
}

window.onload = function(){

const saved = localStorage.getItem("financeData");

if(saved){
try{
const data = JSON.parse(saved);

historique = data.historique || [];
depensesDetail = data.depensesDetail || [];

if(data.revenus)
document.getElementById("revenus").value = data.revenus;

if(data.epargneMois)
document.getElementById("epargneMois").value = data.epargneMois;

if(data.epargneTotale)
document.getElementById("epargneTotale").value = data.epargneTotale;

}catch(e){
console.warn("Erreur chargement données");
}
}
else{
// fallback ancien système UNIQUEMENT si pas de financeData

const savedRevenus = localStorage.getItem("revenus");
const savedEpargne = localStorage.getItem("epargneMois");
const savedEpargneTotale = localStorage.getItem("epargneTotale");

if(savedRevenus){
document.getElementById("revenus").value = savedRevenus;
}

if(savedEpargne){
document.getElementById("epargneMois").value = savedEpargne;
}

if(savedEpargneTotale){
document.getElementById("epargneTotale").value = savedEpargneTotale;
}
}

initChart();
afficherHistorique();
majGraph();
updateObjectifs();

initUI();

const dateElement = document.getElementById("todayDate");

if(dateElement){

const d = new Date();

let dateStr = d.toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long"
});

dateElement.textContent =
dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

}

setTimeout(()=>{
updateRing();
},200);

document.querySelectorAll("input").forEach(input=>{
input.addEventListener("input", update);
});

}

window.addEventListener("beforeunload", () => {
autoSave();
});

window.addEventListener("pagehide", () => {
autoSave();
});

document.addEventListener("visibilitychange", () => {
if(document.visibilityState === "hidden"){
autoSaveDebounced();
}
});

/* SWIPE SECTIONS SUR TABBAR */

const tabbar = document.querySelector(".tabbar");
let tabStartX = 0;

if(tabbar){

tabbar.addEventListener("touchstart",(e)=>{
tabStartX = e.touches[0].clientX;
});

tabbar.addEventListener("touchend",(e)=>{

const diff = e.changedTouches[0].clientX - tabStartX;

if(Math.abs(diff) < 50) return;

if(diff < 0){
goToSection(currentSectionIndex + 1);
}

if(diff > 0){
goToSection(currentSectionIndex - 1);
}

});

}

// Animation splash
setTimeout(() => {

const splash = document.getElementById("splash");
if(!splash) return;

splash.classList.add("hide");

setTimeout(() => {
splash.remove();
}, 600);

}, 700);

 // SERVICE WORKER

window.addEventListener("load", () => {
navigator.serviceWorker

.then(() => console.log("Service Worker enregistré"))
.catch(err => console.log("Erreur SW :", err));
});
}
